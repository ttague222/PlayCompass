# PlayCompass Backend - Cloud Build Configuration
# This file is used by Google Cloud Build to build and deploy the backend

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/playcompass-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/playcompass-api:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/playcompass-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/playcompass-api:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'playcompass-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/playcompass-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=playcompass-640d4'

images:
  - 'gcr.io/$PROJECT_ID/playcompass-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/playcompass-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
